<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Access Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
background:black;
color:white;
font-family:Inter;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#111;
padding:40px;
border-radius:10px;
width:320px;
border:1px solid #222;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
background:#000;
border:1px solid #333;
color:white;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:white;
color:black;
border:none;
border-radius:6px;
font-weight:600;
cursor:pointer;
}

.error{
color:red;
font-size:14px;
margin-top:10px;
display:none;
}

</style>

</head>

<body>

<div class="box">

<h2>Private Access</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Access Proposal</button>

<div class="error" id="error">Invalid email or password</div>

</div>


<script>

function login(){

var email=document.getElementById("email").value;
var password=document.getElementById("password").value;

if(email==="sameer@gmail.com" && password==="Sameer1234"){

window.location.href="i.html";

}

else{

document.getElementById("error").style.display="block";

}

}

</script>

</body>
</html>
